<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Опросники | Rubi Antwoord</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #f0f4f9;
            --bg-container: rgba(255,255,255,0.7);
            --bg-container-blur: blur(20px);
            --text-primary: #0b1a2e;
            --text-secondary: #4a5e78;
            --text-muted: #6b7f99;
            --border-color: rgba(255,255,255,0.25);
            --shadow: 0 25px 60px rgba(0,0,0,0.08);
            --shadow-hover: 0 30px 70px rgba(0,0,0,0.12);
            --glass-border: rgba(255,255,255,0.2);
            --btn-back: rgba(255,255,255,0.5);
            --btn-back-hover: rgba(255,255,255,0.8);
            --bg-image: linear-gradient(135deg, #0b1a2e 0%, #1a3050 100%);
        }

        [data-theme="dark"] {
            --bg-body: #0b1a2e;
            --bg-container: rgba(20,30,50,0.75);
            --bg-container-blur: blur(25px);
            --text-primary: #e8edf4;
            --text-secondary: #9aafc8;
            --text-muted: #6b8ba8;
            --border-color: rgba(255,255,255,0.08);
            --shadow: 0 25px 60px rgba(0,0,0,0.3);
            --shadow-hover: 0 30px 70px rgba(0,0,0,0.4);
            --glass-border: rgba(255,255,255,0.04);
            --btn-back: rgba(255,255,255,0.04);
            --btn-back-hover: rgba(255,255,255,0.08);
            --bg-image: linear-gradient(135deg, #0b1a2e 0%, #1a2a42 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1.5rem;
            background: var(--bg-image);
            background-size: cover;
            background-position: center;
            transition: background 0.3s ease;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: var(--bg-container);
            backdrop-filter: var(--bg-container-blur);
            -webkit-backdrop-filter: var(--bg-container-blur);
            border-radius: 32px;
            padding: 3rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--glass-border);
            text-align: center;
            transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }
        .container:hover {
            box-shadow: var(--shadow-hover);
        }

        .theme-toggle {
            background: var(--btn-back);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 0.3rem 0.8rem;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s ease;
            color: var(--text-secondary);
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            backdrop-filter: blur(4px);
            margin-bottom: 1.5rem;
        }
        .theme-toggle:hover { transform: scale(1.05); background: var(--btn-back-hover); }
        .theme-toggle .label {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .logo {
            font-size: 3.5rem;
            margin-bottom: 0.5rem;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        h1 {
            font-size: 2rem;
            color: var(--text-primary);
            margin-bottom: 0.3rem;
            transition: color 0.3s ease;
        }
        .subtitle {
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-size: 1rem;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .link-card {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            padding: 1.2rem 1.5rem;
            border-radius: 16px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            transition: 0.3s ease;
            font-size: 1.1rem;
            border: 1px solid transparent;
            position: relative;
            overflow: hidden;
        }
        .link-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%);
            opacity: 0;
            transition: 0.3s ease;
        }
        .link-card:hover::before { opacity: 1; }
        .link-card:hover { transform: scale(1.02) translateY(-2px); }
        .link-card .icon { font-size: 1.5rem; }
        .link-card.discipline { background: linear-gradient(135deg, #7c3aed, #6d28d9); }
        .link-card.discipline:hover { box-shadow: 0 8px 30px rgba(124,58,237,0.3); }
        .link-card.hr { background: linear-gradient(135deg, #059669, #047857); }
        .link-card.hr:hover { box-shadow: 0 8px 30px rgba(5,150,105,0.3); }
        .link-card.admin { background: linear-gradient(135deg, #2563eb, #1d4ed8); }
        .link-card.admin:hover { box-shadow: 0 8px 30px rgba(37,99,235,0.3); }

        .footer-brand {
            margin-top: 2rem;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            opacity: 0.6;
            transition: opacity 0.3s ease, color 0.3s ease;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
        }
        .footer-brand:hover {
            opacity: 1;
        }
        .footer-brand span {
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        @media (max-width: 600px) {
            .container { padding: 2rem 1.5rem; }
            h1 { font-size: 1.6rem; }
            .logo { font-size: 2.8rem; }
            .theme-toggle .label { display: none; }
        }
    </style>
</head>
<body>
<div class="container">
    <div style="display:flex; justify-content:flex-end;">
        <button class="theme-toggle" id="indexThemeToggle" aria-label="Переключить тему">
            <span id="indexThemeIcon">🌙</span>
            <span class="label" id="indexThemeLabel">Тёмная</span>
        </button>
    </div>

    <div class="logo">📋</div>
    <h1>Опросники</h1>
    <p class="subtitle">Выберите нужную анкету</p>

    <div class="links">
        <a href="/survey1.html" class="link-card discipline">
            <span class="icon">🏛️</span> Дисциплинарный инспектор
        </a>
        <a href="/survey2.html" class="link-card hr">
            <span class="icon">👔</span> HR-менеджер
        </a>
        <a href="/admin.html" class="link-card admin">
            <span class="icon">🔒</span> Панель администратора
        </a>
    </div>

    <div class="footer-brand">by <span>Rubi Antwoord</span></div>
</div>

<script>
    // ============================================================
    // ТЕМА ДЛЯ ГЛАВНОЙ СТРАНИЦЫ
    // ============================================================
    const themeToggle = document.getElementById('indexThemeToggle');
    const themeIcon = document.getElementById('indexThemeIcon');
    const themeLabel = document.getElementById('indexThemeLabel');
    
    function toggleTheme() {
        const current = document.documentElement.getAttribute('data-theme');
        const newTheme = current === 'dark' ? '' : 'dark';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        updateThemeUI(newTheme);
    }

    function updateThemeUI(theme) {
        if (theme === 'dark') {
            themeIcon.textContent = '☀️';
            themeLabel.textContent = 'Светлая';
        } else {
            themeIcon.textContent = '🌙';
            themeLabel.textContent = 'Тёмная';
        }
    }

    themeToggle.addEventListener('click', toggleTheme);

    const savedTheme = localStorage.getItem('theme') || '';
    document.documentElement.setAttribute('data-theme', savedTheme);
    updateThemeUI(savedTheme);
</script>
</body>
</html>
