<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приём заявок | Rubi Antwoord</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        /* ============================================================
           ПЕРЕМЕННЫЕ ДЛЯ ТЕМ
           ============================================================ */
        :root {
            --bg-body: #f0f4f9;
            --bg-card: rgba(255,255,255,0.85);
            --bg-header: rgba(255,255,255,0.85);
            --text-primary: #0b1a2e;
            --text-secondary: #4a5e78;
            --text-muted: #6b7f99;
            --border-color: rgba(255,255,255,0.3);
            --shadow: 0 4px 20px rgba(0,0,0,0.04);
            --shadow-hover: 0 8px 35px rgba(0,0,0,0.08);
            --glass-border: rgba(255,255,255,0.2);
            --tag-bg: rgba(255,255,255,0.5);
            --tag-color: #4a5e78;
            --badge-pending: #fef3c7;
            --badge-pending-text: #b45309;
            --badge-approved: #d1fae5;
            --badge-approved-text: #065f46;
            --badge-rejected: #fee9e7;
            --badge-rejected-text: #a13026;
            --btn-clear: #6b7f99;
            --btn-clear-hover: #a13026;
            --btn-approve: #d1fae5;
            --btn-approve-hover: #a7f3d0;
            --btn-approve-text: #065f46;
            --btn-reject: #fee9e7;
            --btn-reject-hover: #fecaca;
            --btn-reject-text: #a13026;
            --tab-bg: rgba(255,255,255,0.5);
            --tab-active: #0b1a2e;
            --tab-text: #4a5e78;
            --tab-active-text: #ffffff;
            --scrollbar-track: #eef2f7;
            --scrollbar-thumb: #d1d9e6;
            --bg-container-blur: blur(20px);
            --shadow-card: 0 4px 20px rgba(0,0,0,0.04);
        }

        [data-theme="dark"] {
            --bg-body: #0b1a2e;
            --bg-card: rgba(20,30,50,0.8);
            --bg-header: rgba(20,30,50,0.85);
            --text-primary: #e8edf4;
            --text-secondary: #9aafc8;
            --text-muted: #6b8ba8;
            --border-color: rgba(255,255,255,0.06);
            --shadow: 0 4px 20px rgba(0,0,0,0.2);
            --shadow-hover: 0 8px 35px rgba(0,0,0,0.3);
            --glass-border: rgba(255,255,255,0.04);
            --tag-bg: rgba(255,255,255,0.04);
            --tag-color: #9aafc8;
            --badge-pending: rgba(254,243,199,0.2);
            --badge-pending-text: #fcd34d;
            --badge-approved: rgba(5,150,105,0.25);
            --badge-approved-text: #34d399;
            --badge-rejected: rgba(220,38,38,0.2);
            --badge-rejected-text: #f87171;
            --btn-clear: #6b8ba8;
            --btn-clear-hover: #f87171;
            --btn-approve: rgba(5,150,105,0.2);
            --btn-approve-hover: rgba(5,150,105,0.35);
            --btn-approve-text: #34d399;
            --btn-reject: rgba(220,38,38,0.2);
            --btn-reject-hover: rgba(220,38,38,0.35);
            --btn-reject-text: #f87171;
            --tab-bg: rgba(255,255,255,0.04);
            --tab-active: #2563eb;
            --tab-text: #9aafc8;
            --tab-active-text: #ffffff;
            --scrollbar-track: #1a2a42;
            --scrollbar-thumb: #2a4a6a;
            --bg-container-blur: blur(25px);
            --shadow-card: 0 4px 20px rgba(0,0,0,0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-body);
            padding: 2rem 1.5rem;
            min-height: 100vh;
            transition: background 0.3s ease;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: var(--bg-card);
            backdrop-filter: var(--bg-container-blur);
            -webkit-backdrop-filter: var(--bg-container-blur);
            border-radius: 32px;
            padding: 2rem;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-card);
            transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        /* ============================================================
           ХЕДЕР
           ============================================================ */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }
        .header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.3s ease;
        }
        .header-actions {
            display: flex;
            gap: 0.8rem;
            align-items: center;
        }

        .theme-toggle {
            background: var(--tag-bg);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 0.3rem 0.8rem;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s ease;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .theme-toggle:hover { transform: scale(1.05); }
        .theme-toggle .label {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .btn-clear {
            background: transparent;
            border: 1px solid var(--border-color);
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            font-size: 0.8rem;
            color: var(--btn-clear);
            cursor: pointer;
            transition: 0.2s ease;
        }
        .btn-clear:hover {
            background: var(--btn-reject);
            border-color: var(--btn-reject-text);
            color: var(--btn-clear-hover);
        }

        /* ============================================================
           ВКЛАДКИ
           ============================================================ */
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .tab {
            padding: 0.6rem 1.8rem;
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s ease;
            background: var(--tab-bg);
            color: var(--tab-text);
            backdrop-filter: blur(4px);
        }
        .tab:hover { background: var(--tag-bg); }
        .tab.active {
            background: var(--tab-active);
            color: var(--tab-active-text);
            border-color: var(--tab-active);
        }
        .tab .count {
            background: rgba(255,255,255,0.2);
            padding: 0.05rem 0.6rem;
            border-radius: 40px;
            font-size: 0.7rem;
            margin-left: 0.3rem;
        }
        .tab.active .count { background: rgba(255,255,255,0.2); }

        /* ============================================================
           КАРТОЧКИ (старый дизайн — список)
           ============================================================ */
        .answers-grid {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .answer-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 1.5rem 1.8rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--glass-border);
            cursor: pointer;
            transition: 0.25s ease;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }
        .answer-card:hover {
            box-shadow: var(--shadow-hover);
            border-color: rgba(37,99,235,0.1);
            transform: translateY(-2px);
        }

        .card-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: baseline;
            gap: 0.5rem 1rem;
            margin-bottom: 0.5rem;
        }
        .card-id {
            font-weight: 600;
            color: #2563eb;
            background: rgba(37,99,235,0.08);
            padding: 0.1rem 0.9rem;
            border-radius: 40px;
            font-size: 0.75rem;
        }
        .card-date {
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .card-preview {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem 2rem;
            align-items: center;
        }
        .card-preview .name {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 1rem;
        }
        .card-preview .ic {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .card-preview .type-tag {
            font-size: 0.7rem;
            padding: 0.1rem 0.8rem;
            border-radius: 40px;
            font-weight: 600;
        }
        .type-tag.discipline {
            background: rgba(124,58,237,0.12);
            color: #7c3aed;
        }
        .type-tag.hr {
            background: rgba(5,150,105,0.12);
            color: #059669;
        }

        .expand-icon {
            margin-left: auto;
            color: var(--text-muted);
            font-size: 0.8rem;
            background: var(--tag-bg);
            padding: 0.1rem 0.9rem;
            border-radius: 40px;
        }

        .status-badge {
            font-size: 0.7rem;
            padding: 0.1rem 0.8rem;
            border-radius: 40px;
            font-weight: 600;
        }
        .status-badge.pending {
            background: var(--badge-pending);
            color: var(--badge-pending-text);
        }
        .status-badge.approved {
            background: var(--badge-approved);
            color: var(--badge-approved-text);
        }
        .status-badge.rejected {
            background: var(--badge-rejected);
            color: var(--badge-rejected-text);
        }

        /* ============================================================
           ДЕТАЛИ КАРТОЧКИ
           ============================================================ */
        .card-detail {
            display: none;
            margin-top: 1.2rem;
            padding-top: 1.2rem;
            border-top: 1px dashed var(--border-color);
            gap: 0.8rem;
            flex-direction: column;
        }
        .card-detail.open { display: flex; }

        .detail-row {
            display: grid;
            grid-template-columns: 220px 1fr;
            gap: 0.5rem 1rem;
            padding: 0.4rem 0;
            border-bottom: 1px solid var(--border-color);
        }
        .detail-row .label {
            font-weight: 500;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        .detail-row .value {
            color: var(--text-primary);
            word-break: break-word;
            white-space: pre-wrap;
        }
        .detail-row .value img {
            max-width: 200px;
            max-height: 200px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            object-fit: contain;
            background: white;
            cursor: pointer;
            transition: 0.2s;
        }
        .detail-row .value img:hover { transform: scale(1.02); }

        .rating-chips {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }
        .rating-chip {
            background: var(--tag-bg);
            padding: 0.3rem 0.8rem;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        .rating-chip .stars {
            color: #f59e0b;
            letter-spacing: 2px;
            font-size: 1rem;
        }
        .rating-chip .label-text {
            min-width: 140px;
            color: var(--text-secondary);
        }
        .rating-chip .score-text {
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .rating-divider {
            margin: 0.2rem 0 0.4rem 0;
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.9rem;
            padding: 0.3rem 0.5rem;
            background: var(--tag-bg);
            border-radius: 40px;
            display: inline-block;
        }

        .tag-yes {
            color: #0b5e2e;
            background: #e6f7e6;
            padding: 0.1rem 0.8rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.8rem;
        }
        .tag-no {
            color: #a13026;
            background: #fee9e7;
            padding: 0.1rem 0.8rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.8rem;
        }

        /* ============================================================
           КНОПКИ ДЕЙСТВИЙ
           ============================================================ */
        .action-buttons {
            display: flex;
            gap: 0.8rem;
            margin-top: 0.8rem;
            padding-top: 0.8rem;
            border-top: 1px solid var(--border-color);
            flex-wrap: wrap;
        }
        .btn-action {
            padding: 0.4rem 1.2rem;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .btn-action.approve {
            background: var(--btn-approve);
            color: var(--btn-approve-text);
        }
        .btn-action.approve:hover { background: var(--btn-approve-hover); }
        .btn-action.reject {
            background: var(--btn-reject);
            color: var(--btn-reject-text);
        }
        .btn-action.reject:hover { background: var(--btn-reject-hover); }
        .btn-action:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* ============================================================
           ПУСТОЕ СОСТОЯНИЕ
           ============================================================ */
        .empty-state {
            text-align: center;
            padding: 4rem 1rem;
            background: var(--bg-card);
            border-radius: 28px;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
        }
        .empty-state span { font-size: 3rem; display: block; margin-bottom: 0.5rem; }
        .empty-state .error { color: var(--btn-reject-text); }

        .footer-brand {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            opacity: 0.6;
            transition: opacity 0.3s ease, color 0.3s ease;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
        }
        .footer-brand:hover {
            opacity: 1;
        }
        .footer-brand span {
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        /* ============================================================
           АДАПТИВ
           ============================================================ */
        @media (max-width: 600px) {
            .container { padding: 1rem; }
            .detail-row {
                grid-template-columns: 1fr;
                gap: 0.1rem;
            }
            .answer-card { padding: 1rem; }
            .rating-chip { flex-wrap: wrap; gap: 0.2rem; }
            .rating-chip .label-text { min-width: 100px; }
            .theme-toggle .label { display: none; }
            .header h1 { font-size: 1.2rem; }
            .tab { padding: 0.4rem 1rem; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>
            📋 Приём заявок
            <span style="font-size:0.8rem;font-weight:400;color:var(--text-muted);" id="totalCount"></span>
        </h1>
        <div class="header-actions">
            <button class="theme-toggle" id="adminThemeToggle" aria-label="Переключить тему">
                <span id="adminThemeIcon">🌙</span>
                <span class="label" id="adminThemeLabel">Тёмная</span>
            </button>
            <button class="btn-clear" id="clearBtn">🗑️ Очистить всё</button>
        </div>
    </div>

    <div class="tabs">
        <button class="tab active" data-type="all">📋 Все <span class="count" id="countAll">0</span></button>
        <button class="tab" data-type="discipline">🏛️ Дисциплинарный <span class="count" id="countDiscipline">0</span></button>
        <button class="tab" data-type="hr">👔 HR <span class="count" id="countHr">0</span></button>
    </div>

    <div id="answersContainer" class="answers-grid">
        <div class="empty-state"><span>⏳</span><p>Загрузка...</p></div>
    </div>

    <div class="footer-brand">by <span>Rubi Antwoord</span></div>
</div>

<script>
    const container = document.getElementById('answersContainer');
    let currentFilter = 'all';
    let expandedCards = new Set();

    // ============================================================
    // 1. ТЕМА
    // ============================================================
    const themeToggle = document.getElementById('adminThemeToggle');
    const themeIcon = document.getElementById('adminThemeIcon');
    const themeLabel = document.getElementById('adminThemeLabel');
    
    function toggleTheme() {
        const current = document.documentElement.getAttribute('data-theme');
        const newTheme = current === 'dark' ? '' : 'dark';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        updateThemeUI(newTheme);
    }

    function updateThemeUI(theme) {
        if (theme === 'dark') {
            themeIcon.textContent = '☀️';
            themeLabel.textContent = 'Светлая';
        } else {
            themeIcon.textContent = '🌙';
            themeLabel.textContent = 'Тёмная';
        }
    }

    themeToggle.addEventListener('click', toggleTheme);

    const savedTheme = localStorage.getItem('theme') || '';
    document.documentElement.setAttribute('data-theme', savedTheme);
    updateThemeUI(savedTheme);

    // ============================================================
    // 2. ВРЕМЯ ПО МСК
    // ============================================================
    function formatDateToMSK(dateString) {
        const date = new Date(dateString);
        // Переводим в МСК (UTC+3)
        const mskTime = new Date(date.getTime() + (3 * 60 * 60 * 1000));
        return mskTime.toLocaleString('ru-RU', {
            day: 'numeric',
            month: 'short',
            hour: '2-digit',
            minute: '2-digit'
        });
    }

    // ============================================================
    // 3. ЗАГРУЗКА ДАННЫХ
    // ============================================================
    function loadAnswersFromServer() {
        container.innerHTML = `<div class="empty-state"><span>⏳</span><p>Загрузка...</p></div>`;
        
        fetch('/api/answers?type=' + currentFilter)
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    container.innerHTML = `<div class="empty-state"><span>⚠️</span><p class="error">Ошибка: ${data.error}</p></div>`;
                    return;
                }
                renderAnswers(data);
                updateCounts(data);
                document.getElementById('totalCount').textContent = `(${data.length} заявок)`;
            })
            .catch((err) => {
                container.innerHTML = `<div class="empty-state"><span>⚠️</span><p class="error">Ошибка соединения с сервером</p><p style="font-size:0.8rem;margin-top:0.5rem;">${err.message}</p></div>`;
            });
    }

    // ============================================================
    // 4. ОБНОВЛЕНИЕ СЧЁТЧИКОВ
    // ============================================================
    function updateCounts(answers) {
        if (!answers) return;
        const discipline = answers.filter(a => a.surveyType === 'discipline');
        const hr = answers.filter(a => a.surveyType === 'hr');
        document.getElementById('countAll').textContent = answers.length;
        document.getElementById('countDiscipline').textContent = discipline.length;
        document.getElementById('countHr').textContent = hr.length;
    }

    // ============================================================
    // 5. ПАРОЛЬ НА ОЧИСТКУ
    // ============================================================
    document.getElementById('clearBtn').addEventListener('click', function() {
        const password = prompt('🔒 Введите пароль для очистки всех заявок:');
        if (password === '54321') {
            if (confirm('⚠️ Удалить все ответы навсегда?')) {
                fetch('/api/clear-all', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                })
                .then(() => {
                    loadAnswersFromServer();
                })
                .catch(() => {
                    alert('❌ Ошибка при очистке!');
                });
            }
        } else if (password !== null) {
            alert('❌ Неверный пароль!');
        }
    });

    // ============================================================
    // 6. ОБНОВЛЕНИЕ СТАТУСА
    // ============================================================
    function updateStatus(id, status) {
        fetch('/api/update-status', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: id, status: status })
        })
        .then(res => res.json())
        .then(() => {
            loadAnswersFromServer();
        })
        .catch(() => {
            alert('❌ Ошибка при обновлении статуса!');
        });
    }

    // ============================================================
    // 7. ОТРИСОВКА КАРТОЧЕК
    // ============================================================
    function renderAnswers(answers) {
        if (!answers || !answers.length) {
            container.innerHTML = `<div class="empty-state"><span>📭</span><p style="font-weight:500;">Нет заявок</p><p style="font-size:0.9rem;color:var(--text-muted);">Пока никто не заполнил опросник</p></div>`;
            return;
        }

        const sorted = [...answers];
        let html = '';

        sorted.forEach((item) => {
            const isExpanded = expandedCards.has(item.id);
            const answer = item.answer || {};
            
            const statusText = item.status === 'approved' ? '✅ Одобрено' : item.status === 'rejected' ? '❌ Отказано' : '⏳ На рассмотрении';
            const statusClass = item.status === 'approved' ? 'approved' : item.status === 'rejected' ? 'rejected' : 'pending';
            const typeLabel = item.surveyType === 'discipline' ? 'Дисциплинарный инспектор' : 'HR-менеджер';
            const typeClass = item.surveyType === 'discipline' ? 'discipline' : 'hr';

            // Время по МСК
            const dateStr = item.createdAt ? formatDateToMSK(item.createdAt) : 'неизвестно';

            const ratings = answer.ratings || {};
            const ratingLabels = {
                d_r1: 'Адекватность', d_r2: 'Стрессоустойчивость', d_r3: 'Знание правил сервера',
                d_r4: 'Любовь к своей работе', d_r5: 'Целеустремленность',
                d_r6: 'Конституция', d_r7: 'Уголовный кодекс', d_r8: 'Этический кодекс',
                d_r9: 'Устав Goverment', d_r10: 'Устав Секретариата', d_r11: 'Трудовой Кодекс',
                h_r1: 'Адекватность', h_r2: 'Стрессоустойчивость', h_r3: 'Знание правил сервера',
                h_r4: 'Любовь к своей работе', h_r5: 'Целеустремленность',
                h_r6: 'Конституция', h_r7: 'Уголовный кодекс', h_r8: 'Этический кодекс',
                h_r9: 'Устав Goverment', h_r10: 'Устав Секретариата', h_r11: 'Трудовой Кодекс',
                h_r12: 'Информация о лицензиях'
            };
            const selfKeys = ['r1', 'r2', 'r3', 'r4', 'r5'];
            const docKeys = ['r6', 'r7', 'r8', 'r9', 'r10', 'r11', 'r12'];

            function renderRatingGroup(keys, groupName) {
                const prefix = item.surveyType === 'discipline' ? 'd_' : 'h_';
                const items = keys.filter(k => ratings[`${prefix}${k}`] !== undefined);
                if (!items.length) return '';
                const chips = items.map(k => {
                    const key = `${prefix}${k}`;
                    const val = ratings[key] || 0;
                    const stars = '★'.repeat(val) + '☆'.repeat(5 - val);
                    const label = ratingLabels[key] || k;
                    return `<div class="rating-chip"><span class="label-text">${label}</span><span class="stars">${stars}</span><span class="score-text">(${val}/5)</span></div>`;
                }).join('');
                return `<div class="rating-divider">${groupName}</div>${chips}`;
            }

            // === Детали ===
            let extraDetails = '';
            if (item.surveyType === 'discipline') {
                const expTag = answer.experience === 'yes' ? '<span class="tag-yes">✅ Да</span>' : answer.experience === 'no' ? '<span class="tag-no">❌ Нет</span>' : '—';
                const expDetail = answer.experience === 'yes' && answer.experienceDetail ? answer.experienceDetail : '—';
                const examTag = answer.examMoney === 'yes' ? '<span class="tag-yes">✅ Да</span>' : '<span class="tag-no">❌ Нет</span>';
                extraDetails = `
                    <div class="detail-row"><span class="label">Имеется ли у вас опыт работы на похожих должностях?</span><span class="value">${expTag}</span></div>
                    ${answer.experience === 'yes' ? `<div class="detail-row"><span class="label">Где и кем вы работали?</span><span class="value">${expDetail}</span></div>` : ''}
                    <div class="detail-row"><span class="label">Допустимо ли брать деньги за сдачу экзаменов (именно в Аппарате Правительства)?</span><span class="value">${examTag}</span></div>
                    ${answer.examMoney === 'no' && answer.situation3 ? `<div class="detail-row"><span class="label">Вы заметили, что Ваш коллега берёт деньги за повышение сотрудников, что Вы будете делать?</span><span class="value">${answer.situation3}</span></div>` : ''}
                    <div class="detail-row"><span class="label">Представим такую ситуацию: В мэрии никого нет, но при этом в штате есть сотрудники Аппарата Правительства, что вы будете делать?</span><span class="value">${answer.situation1 || '—'}</span></div>
                    <div class="detail-row"><span class="label">Вас оскорбили в Дискорде, что вы будете делать?</span><span class="value">${answer.situation2 || '—'}</span></div>
                    <div class="detail-row"><span class="label">Пару слов о себе</span><span class="value">${answer.about || '—'}</span></div>
                    <div class="detail-row"><span class="label">Ради чего Вы хотите стать Дисциплинарным инспектором?</span><span class="value">${answer.motivation || '—'}</span></div>
                    <div class="detail-row"><span class="label">Как вы думаете, какими качествами должен обладать Дисциплинарный инспектор?</span><span class="value">${answer.qualities || '—'}</span></div>
                `;
            } else if (item.surveyType === 'hr') {
                const expTag = answer.experience === 'yes' ? '<span class="tag-yes">✅ Да</span>' : answer.experience === 'no' ? '<span class="tag-no">❌ Нет</span>' : '—';
                const expDetail = answer.experience === 'yes' && answer.experienceDetail ? answer.experienceDetail : '—';
                const examTag = answer.examMoney === 'yes' ? '<span class="tag-yes">✅ Да</span>' : '<span class="tag-no">❌ Нет</span>';
                const traineeTag = answer.trainee === 'yes' ? '<span class="tag-yes">✅ Да</span>' : '<span class="tag-no">❌ Нет</span>';
                extraDetails = `
                    <div class="detail-row"><span class="label">Имеется ли у Вас опыт HR-менеджера или в других фракциях на похожих должностях?</span><span class="value">${expTag}</span></div>
                    ${answer.experience === 'yes' ? `<div class="detail-row"><span class="label">Где и кем вы работали?</span><span class="value">${expDetail}</span></div>` : ''}
                    <div class="detail-row"><span class="label">Допустимо ли брать деньги за сдачу экзаменов (именно в Аппарате Правительства)?</span><span class="value">${examTag}</span></div>
                    ${answer.examMoney === 'no' && answer.situationColleague ? `<div class="detail-row"><span class="label">Вы заметили, что Ваш коллега берёт деньги за повышение сотрудников, что Вы будете делать?</span><span class="value">${answer.situationColleague}</span></div>` : ''}
                    <div class="detail-row"><span class="label">Готовы ли вы уделять время стажерам, которые требуют особого внимания?</span><span class="value">${traineeTag}</span></div>
                    ${answer.trainee === 'yes' && answer.traineeDetail ? `<div class="detail-row"><span class="label">Молодой стажер никак не может сдать первый экзамен на секретаря. Расскажите, как вы сможете ему помочь?</span><span class="value">${answer.traineeDetail}</span></div>` : ''}
                    <div class="detail-row"><span class="label">Представим такую ситуацию: В мэрии никого нет, но при этом в штате есть сотрудники Аппарата Правительства, что вы будете делать?</span><span class="value">${answer.situation1 || '—'}</span></div>
                    <div class="detail-row"><span class="label">Как вы относитесь к индивидуальным наборам? (Раздача листовок, агитируя отдел АП)</span><span class="value">${answer.individual || '—'}</span></div>
                    <div class="detail-row"><span class="label">Вас оскорбили в Дискорде, что вы будете делать?</span><span class="value">${answer.situation2 || '—'}</span></div>
                    <div class="detail-row"><span class="label">Пару слов о себе</span><span class="value">${answer.about || '—'}</span></div>
                    <div class="detail-row"><span class="label">Ради чего Вы хотите стать HR-менеджером?</span><span class="value">${answer.motivation || '—'}</span></div>
                    <div class="detail-row"><span class="label">Как Вы думаете, чем занимается HR-менеджер?</span><span class="value">${answer.hrDuties || '—'}</span></div>
                `;
            }

            const ratingHtml = renderRatingGroup(selfKeys, '— Оцените себя —') + renderRatingGroup(docKeys, '— Знание законодательной базы —');

            html += `
                <div class="answer-card" data-id="${item.id}">
                    <div class="card-header">
                        <span class="card-id">#${item.id}</span>
                        <span class="card-date">${dateStr}</span>
                        <span class="status-badge ${statusClass}">${statusText}</span>
                    </div>
                    <div class="card-preview">
                        <span class="name">👤 ${answer.q2 || '—'}</span>
                        <span class="ic">🎭 ${answer.q1 || '—'}</span>
                        <span class="type-tag ${typeClass}">${typeLabel}</span>
                        <span class="expand-icon">${isExpanded ? '▼ свернуть' : '▶ развернуть'}</span>
                    </div>
                    <div class="card-detail ${isExpanded ? 'open' : ''}">
                        <div class="detail-row"><span class="label">Ваше Имя Фамилия (IC)</span><span class="value">${answer.q1 || '—'}</span></div>
                        <div class="detail-row"><span class="label">Ваше Имя (OOC)</span><span class="value">${answer.q2 || '—'}</span></div>
                        <div class="detail-row"><span class="label">Ваш возраст (OOC)</span><span class="value">${answer.q3 || '—'}</span></div>
                        <div class="detail-row"><span class="label">Ваш игровой онлайн (OOC)</span><span class="value">${answer.q4 || '—'}</span></div>
                        <div class="detail-row"><span class="label">Ваш прайм-тайм</span><span class="value">${answer.q5 || '—'}</span></div>
                        <div class="detail-row"><span class="label">Ваш часовой пояс</span><span class="value">${answer.q6 || '—'}</span></div>
                        ${extraDetails}

                        <div class="detail-row">
                            <span class="label">⭐ Рейтинги</span>
                            <div class="rating-chips">${ratingHtml}</div>
                        </div>

                        ${answer.drawing ? `
                        <div class="detail-row">
                            <span class="label">🎨 Подарок для ГАП и ЗГАП</span>
                            <span class="value">
                                <img src="${answer.drawing}" alt="Рисунок" onclick="window.open(this.src,'_blank')">
                            </span>
                        </div>
                        ` : ''}

                        <div class="action-buttons">
                            <button class="btn-action approve" data-id="${item.id}" ${item.status === 'approved' ? 'disabled' : ''}>✅ Одобрено</button>
                            <button class="btn-action reject" data-id="${item.id}" ${item.status === 'rejected' ? 'disabled' : ''}>❌ Отказано</button>
                        </div>
                    </div>
                </div>
            `;
        });

        container.innerHTML = html;

        // === Клики по карточкам ===
        document.querySelectorAll('.answer-card').forEach(card => {
            const id = parseInt(card.dataset.id);
            const detail = card.querySelector('.card-detail');
            const icon = card.querySelector('.expand-icon');
            
            card.addEventListener('click', function(e) {
                if (e.target.closest('.action-buttons') || e.target.closest('.btn-action')) return;
                const isOpen = detail.classList.contains('open');
                if (isOpen) {
                    detail.classList.remove('open');
                    if (icon) icon.textContent = '▶ развернуть';
                    expandedCards.delete(id);
                } else {
                    detail.classList.add('open');
                    if (icon) icon.textContent = '▼ свернуть';
                    expandedCards.add(id);
                }
            });
        });

        // === Кнопки действий ===
        document.querySelectorAll('.btn-action').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                const id = parseInt(this.dataset.id);
                if (this.classList.contains('approve')) {
                    updateStatus(id, 'approved');
                } else {
                    updateStatus(id, 'rejected');
                }
            });
        });
    }

    // ============================================================
    // 8. ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК
    // ============================================================
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', function() {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            this.classList.add('active');
            currentFilter = this.dataset.type;
            loadAnswersFromServer();
        });
    });

    // ============================================================
    // 9. ЗАПУСК
    // ============================================================
    loadAnswersFromServer();

    document.addEventListener('visibilitychange', () => {
        if (!document.hidden) {
            loadAnswersFromServer();
        }
    });
</script>
</body>
</html>
